<style>
/*
  Micro-Minimalist & High-Density Design System
*/

:root {
  --color-primary: #1a73e8;
  --color-primary-hover: #1557b0;
  --color-border: #dadce0;
  --color-bg-main: #ffffff;
  --color-bg-subtle: #f8f9fa;
  --color-bg-header: #f1f3f4;
  --color-text-main: #202124;
  --color-text-subtle: #5f6368;
  --color-danger: #d93025;
  --color-danger-bg: #fce8e6;
  --color-warning: #f29900;
  --color-warning-bg: #fef7e0;
  --color-success: #188038;

  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-size-base: 12px;
  --font-size-small: 11px;
  --font-size-label: 10px;
  --font-size-header: 14px;

  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;

  --border-radius: 5px;
  --focus-ring: 0 0 0 2px rgba(26, 115, 232, 0.15);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* Thin custom scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

body {
  font-family: var(--font-family);
  font-size: var(--font-size-base);
  color: var(--color-text-main);
  background-color: var(--color-bg-main);
  height: 100vh;
  overflow: hidden;
}

/* Layout */
.app-container {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  width: 300px;
  min-width: 300px;
  height: 100%;
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  background-color: var(--color-bg-subtle);
  overflow-y: auto;
}

.main-content {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  background-color: var(--color-bg-main);
}

.app-title {
  font-size: var(--font-size-header);
  font-weight: 600;
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--color-border);
  background-color: var(--color-bg-main);
  margin-bottom: 0;
}

/* Sections */
.section {
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.section-label {
  font-size: var(--font-size-label);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-subtle);
  margin-bottom: var(--spacing-xs);
  display: block;
}

.text-hint {
  font-size: var(--font-size-small);
  color: var(--color-text-subtle);
}

/* Inputs */
.file-input {
  font-size: var(--font-size-small);
  width: 100%;
}

.num-input, .text-input {
  height: 28px;
  padding: 0 var(--spacing-sm);
  border: 1px solid var(--color-border);
  border-radius: var(--border-radius);
  font-family: inherit;
  font-size: var(--font-size-base);
  width: 100%;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.num-input:focus, .text-input:focus {
  border-color: var(--color-primary);
  box-shadow: var(--focus-ring);
}

select.text-input {
  background-color: #fff;
}

.row-trim-group {
  display: flex;
  gap: var(--spacing-md);
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xs);
  flex: 1;
}

.input-group label {
  font-size: var(--font-size-small);
  color: var(--color-text-subtle);
}

/* Collapsible Advanced Options */
details > summary {
  list-style: none;
  cursor: pointer;
  font-size: var(--font-size-small);
  color: var(--color-text-subtle);
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
details > summary::-webkit-details-marker { display: none; }
details > summary::before {
  content: '›';
  font-size: 14px;
  line-height: 1;
  display: inline-block;
  transition: transform 0.15s ease;
}
details[open] > summary::before {
  transform: rotate(90deg);
}

/* Replacements */
.replacements-container {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.replacement-row {
  display: flex;
  gap: var(--spacing-xs);
  align-items: center;
}

.replacement-row input {
  flex: 1;
}

.btn-remove {
  background: none;
  border: none;
  color: var(--color-text-subtle);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  transition: color 0.15s;
}
.btn-remove:hover { color: var(--color-danger); }

.mode-select {
  height: 28px;
  padding: 0 4px;
  border: 1px solid var(--color-border);
  border-radius: var(--border-radius);
  font-family: inherit;
  font-size: var(--font-size-small);
  background-color: #fff;
  color: var(--color-text-subtle);
  cursor: pointer;
  flex-shrink: 0;
  width: 76px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.mode-select:focus {
  border-color: var(--color-primary);
  box-shadow: var(--focus-ring);
}

.keep-open-btn {
  background: none;
  border: none;
  color: var(--color-success);
  cursor: pointer;
  font-family: inherit;
  font-size: var(--font-size-small);
  text-decoration: underline;
  padding: 0;
  margin-left: 6px;
}

/* Radios */
input[type="radio"] {
  accent-color: var(--color-primary);
}

.radio-group {
  display: flex;
  gap: var(--spacing-md);
  font-size: var(--font-size-base);
}

.col-radio {
  flex-direction: column;
  gap: var(--spacing-xs);
}

.row-radio { flex-direction: row; }

.radio-group label {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  cursor: pointer;
}

.dest-input-group {
  margin-top: var(--spacing-xs);
}

/* Alerts */
.alert {
  padding: var(--spacing-sm);
  border-radius: var(--border-radius);
  font-size: var(--font-size-small);
  margin-top: var(--spacing-sm);
  line-height: 1.4;
}

.alert-warning {
  background-color: var(--color-warning-bg);
  border: 1px solid #fadca5;
  color: #7a4f00;
}

/* Actions footer — shadow instead of flat border gives a floating feel */
.actions {
  padding: var(--spacing-lg);
  margin-top: auto;
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.07);
  background-color: var(--color-bg-main);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.btn-primary, .btn-secondary {
  height: 32px;
  border-radius: var(--border-radius);
  font-family: inherit;
  font-size: var(--font-size-base);
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: background-color 0.15s, box-shadow 0.15s;
  width: 100%;
  letter-spacing: 0.01em;
}

.btn-primary {
  background-color: var(--color-primary);
  color: white;
}

.btn-primary:hover:not(:disabled) {
  background-color: var(--color-primary-hover);
  box-shadow: 0 1px 4px rgba(26, 115, 232, 0.4);
}

.btn-primary:disabled {
  background-color: var(--color-bg-header);
  color: var(--color-text-subtle);
  cursor: not-allowed;
}

.btn-secondary {
  background-color: white;
  color: var(--color-text-main);
  border: 1px solid var(--color-border);
  height: 28px;
}
.btn-secondary:hover {
  background-color: var(--color-bg-subtle);
  border-color: #bdc1c6;
}

.status-msg {
  font-size: var(--font-size-small);
  text-align: center;
  min-height: 14px;
}
.status-msg.error { color: var(--color-danger); }
.status-msg.success { color: var(--color-success); }

/* Main Content Area */
.preview-header {
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 57px;
}

.preview-header h2 {
  font-size: var(--font-size-label);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-subtle);
}

.table-container {
  flex-grow: 1;
  overflow: auto;
  padding: var(--spacing-md);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--font-size-small);
  background: white;
  border: 1px solid var(--color-border);
}

.data-table th, .data-table td {
  padding: var(--spacing-xs) var(--spacing-sm);
  border: 1px solid var(--color-border);
  text-align: left;
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.data-table th {
  background-color: var(--color-bg-header);
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 0 var(--color-border);
}

.data-table tbody tr:hover {
  background-color: var(--color-bg-subtle);
}

/* Modal Overlay */
.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(32, 33, 36, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal-dialog {
  background-color: var(--color-bg-main);
  border-radius: 10px;
  width: 320px;
  max-width: 90%;
  padding: var(--spacing-lg);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.08);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

.modal-title {
  font-size: var(--font-size-header);
  font-weight: 600;
  color: var(--color-text-main);
  margin: 0;
}

.modal-body {
  font-size: var(--font-size-base);
  color: var(--color-text-subtle);
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: var(--spacing-sm);
  margin-top: var(--spacing-sm);
}

.modal-btn {
  width: auto;
  padding: 0 var(--spacing-md);
}

.bg-danger { background-color: var(--color-danger); color: white; }
.bg-danger:hover:not(:disabled) { background-color: #b3261e; }
</style>
